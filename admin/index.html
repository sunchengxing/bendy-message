<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bendy-message 管理面板</title>
<script src="https://unpkg.com/petite-vue@0.4.1/dist/petite-vue.iife.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fff;--surface:#f5f5f5;--border:#e0e0e0;--text:#1a1a1a;--text2:#666;--accent:#333;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--sidebar-w:220px;--sidebar-bg:#fafafa}
[data-theme=dark]{--bg:#0a0a0a;--surface:#1a1a1a;--border:#333;--text:#e5e5e5;--text2:#999;--accent:#fff;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--sidebar-bg:#111}

/* Layout modes */
body.layout-left .sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10}
body.layout-left .main{margin-left:var(--sidebar-w)}

body.layout-top .sidebar{position:fixed;left:0;top:0;right:0;height:52px;background:var(--sidebar-bg);border-bottom:1px solid var(--border);display:flex;flex-direction:row;align-items:center;z-index:10}
body.layout-top .sidebar-logo{padding:0 20px;font-size:15px;font-weight:700;letter-spacing:-.02em;border-bottom:none;border-right:1px solid var(--border)}
body.layout-top .sidebar-menu{flex:1;display:flex;padding:0;gap:0}
body.layout-top .sidebar-item{padding:0 16px;font-size:13px;border-left:none;border-bottom:2px solid transparent;line-height:52px}
body.layout-top .sidebar-item.active{border-left:none;border-bottom-color:var(--blue)}
body.layout-top .sidebar-footer{display:none}
body.layout-top .main{margin-left:0;margin-top:52px}

body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* Login */
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-box{text-align:center}
.login-box h1{font-size:28px;font-weight:700;margin-bottom:8px;letter-spacing:-.03em}
.login-box p{color:var(--text2);font-size:14px;margin-bottom:32px}
.login-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:#24292f;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:500}
.login-btn:hover{background:#2f363d}
.login-btn svg{width:20px;height:20px;fill:currentColor}

/* Sidebar (left mode defaults) */
.sidebar{display:flex;flex-direction:column}
.sidebar-logo{padding:20px 20px 16px;font-size:15px;font-weight:700;letter-spacing:-.02em;border-bottom:1px solid var(--border)}
.sidebar-menu{flex:1;padding:8px 0}
.sidebar-item{display:block;padding:10px 20px;font-size:13px;color:var(--text2);cursor:pointer;border-left:3px solid transparent;transition:.1s}
.sidebar-item:hover{background:var(--surface);color:var(--text)}
.sidebar-item.active{color:var(--text);border-left-color:var(--blue);background:var(--surface)}
.sidebar-item .menu-icon{margin-right:8px;font-size:14px}

/* Sidebar footer with avatar */
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-footer .avatar{width:32px;height:32px;border-radius:50%;background:var(--surface);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--text)}
.sidebar-footer .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.sidebar-footer .user-info{flex:1;min-width:0}
.sidebar-footer .admin-name{color:var(--text);font-weight:500;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-footer .admin-role{color:var(--text2);font-size:11px}
.sidebar-footer .logout-link{cursor:pointer;color:var(--red);font-size:11px;flex-shrink:0}

/* Top layout: show user in topbar */
body.layout-top .topbar-user{display:flex;align-items:center;gap:8px;margin-left:auto}
body.layout-top .topbar-user .avatar{width:24px;height:24px;border-radius:50%;background:var(--surface);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text)}
body.layout-top .topbar-user .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
body.layout-left .topbar-user{display:none}

.main{min-height:100vh}
.topbar{display:flex;justify-content:flex-end;align-items:center;padding:12px 24px;border-bottom:1px solid var(--border);gap:12px}
.content{padding:24px}

/* Components */
.btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);cursor:pointer;font-size:13px}
.btn:hover{border-color:var(--accent)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-danger{background:var(--red);color:#fff;border-color:var(--red)}
.btn-sm{padding:4px 10px;font-size:11px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border)}
th{color:var(--text2);font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:.05em}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.badge-online{background:rgba(34,197,94,.12);color:var(--green)}
.badge-offline{background:rgba(239,68,68,.12);color:var(--red)}
.badge-master{background:rgba(59,130,246,.12);color:var(--blue)}
.badge-slave{background:rgba(153,153,153,.12);color:var(--text2)}
.badge-optional{background:rgba(59,130,246,.08);color:var(--blue);font-size:10px}
.empty{padding:40px;text-align:center;color:var(--text2);font-size:14px}
.form-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.form-row label{font-size:12px;color:var(--text2);min-width:60px}
.form-row input{padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px;flex:1;min-width:120px}
.form-row select{padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px;min-width:160px}
.key-val{font-family:monospace;font-size:12px;background:var(--surface);padding:2px 6px;border-radius:3px;user-select:all}
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:99}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:24px;min-width:360px;max-width:480px}
.modal h3{font-size:16px;margin-bottom:16px}
.modal .form-row{margin-bottom:10px}
.modal .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}

/* Tabs */
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;gap:0}
.tab-item{padding:8px 20px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab-item:hover{color:var(--text)}
.tab-item.active{color:var(--text);border-bottom-color:var(--blue);font-weight:500}

/* Key created banner */
.key-created{padding:12px 16px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:8px;margin-bottom:16px;display:flex;align-items:center;gap:12px;font-size:13px}
.key-created .key-value{font-family:monospace;font-size:13px;background:var(--surface);padding:4px 8px;border-radius:4px;user-select:all;flex:1;word-break:break-all}
.key-created .copy-btn{cursor:pointer;color:var(--blue);font-size:12px;flex-shrink:0}

/* Toast */
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;font-size:13px;z-index:999;animation:toast-in .2s}
.toast-success{background:var(--green);color:#fff}
.toast-error{background:var(--red);color:#fff}
@keyframes toast-in{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* Config section */
.config-group{margin-bottom:24px}
.config-group h4{font-size:14px;margin-bottom:12px;font-weight:500}
.config-option{display:flex;align-items:center;gap:12px;padding:10px 0}
.config-option label{font-size:13px;min-width:80px;color:var(--text2)}
.radio-group{display:flex;gap:8px}
.radio-btn{padding:6px 16px;border:1px solid var(--border);border-radius:6px;font-size:13px;cursor:pointer;background:var(--bg);color:var(--text)}
.radio-btn.active{border-color:var(--blue);color:var(--blue);background:rgba(59,130,246,.06)}
.help-section{margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.help-section h4{font-size:14px;margin-bottom:8px;font-weight:600}
.help-section p{color:var(--text2);margin-bottom:8px}
.help-section ul{padding-left:20px;margin:0}
.help-section li{margin-bottom:4px}
.help-section code{font-family:monospace;font-size:12px;background:var(--surface);padding:1px 4px;border-radius:3px}
pre{white-space:pre-wrap;word-break:break-all}
</style>
</head>
<body class="layout-left">
<div v-scope="App()" @vue:mounted="init">

<!-- Login Page -->
<div v-if="!authed" class="login-page" :data-theme="theme">
  <div class="login-box">
    <h1>bendy-message</h1>
    <p>统一消息中心管理面板</p>
    <a href="/api/auth/github" class="login-btn">
      <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      Sign in with GitHub
    </a>
  </div>
</div>

<!-- Main Layout -->
<template v-if="authed">
<div class="sidebar" :data-theme="theme">
  <div class="sidebar-logo">bendy-message</div>
  <div class="sidebar-menu">
    <div class="sidebar-item" :class="{active:tab==='messages'}" @click="tab='messages';loadMessages()"><span class="menu-icon">💬</span>消息管理</div>
    <div class="sidebar-item" :class="{active:tab==='services'}" @click="tab='services';loadServices()"><span class="menu-icon">🔗</span>服务管理</div>
    <div class="sidebar-item" :class="{active:tab==='nodes'}" @click="tab='nodes';loadNodes()"><span class="menu-icon">🖥️</span>节点管理</div>
    <div class="sidebar-item" :class="{active:tab==='keys'}" @click="tab='keys';loadKeys()"><span class="menu-icon">🔑</span>密钥管理</div>
    <div class="sidebar-item" :class="{active:tab==='settings'}" @click="tab='settings';loadAdmins()"><span class="menu-icon">⚙️</span>系统设置</div>
  </div>
  <div class="sidebar-footer">
    <div class="avatar">
      <img v-if="avatarUrl" :src="avatarUrl" @error="avatarUrl=null" alt="">
      <span v-else>{{ currentUser.charAt(0).toUpperCase() }}</span>
    </div>
    <div class="user-info">
      <div class="admin-name">{{ currentUser }}</div>
      <div class="admin-role">管理员</div>
    </div>
    <a class="logout-link" @click="logout">退出</a>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <div class="topbar-user">
      <div class="avatar">
        <img v-if="avatarUrl" :src="avatarUrl" @error="avatarUrl=null" alt="">
        <span v-else>{{ currentUser.charAt(0).toUpperCase() }}</span>
      </div>
      <span style="font-size:12px">{{ currentUser }}</span>
    </div>
    <button class="btn btn-sm" @click="toggleTheme">{{ theme==='dark'?'☀':'☾' }}</button>
  </div>
  <div class="content">

    <!-- 消息管理 -->
    <div v-show="tab==='messages'">
      <h3 style="margin-bottom:16px;font-size:16px">消息管理</h3>
      <div class="form-row" style="margin-bottom:16px">
        <button class="btn btn-primary" @click="showSendMsg=true">发送消息</button>
      </div>
      <table v-if="messages.length">
        <tr><th>ID</th><th>平台</th><th>应用</th><th>用户</th><th>类型</th><th>时间</th><th>操作</th></tr>
        <tr v-for="m in messages" :key="m.id">
          <td class="key-val">{{ m.id.slice(0,8) }}...</td>
          <td>{{ m.platform }}</td><td>{{ m.app_package }}</td><td>{{ m.user_id || '全部用户' }}</td>
          <td><span class="badge">{{ m.msg_type }}</span></td>
          <td>{{ fmt(m.created_at) }}</td>
          <td><button class="btn btn-sm btn-danger" @click="deleteMsg(m.id)">删除</button></td>
        </tr>
      </table>
      <div v-else class="empty">暂无消息</div>
    </div>

    <!-- 服务管理 -->
    <div v-show="tab==='services'">
      <h3 style="margin-bottom:16px;font-size:16px">服务管理</h3>
      <table v-if="services.length">
        <tr><th>名称</th><th>Endpoint</th><th>应用</th><th>平台</th><th>状态</th><th>心跳</th><th>操作</th></tr>
        <tr v-for="s in services" :key="s.id">
          <td>{{ s.name }}</td><td class="key-val">{{ s.endpoint }}</td><td>{{ s.app_package }}</td>
          <td>{{ s.platforms.join(', ') }}</td>
          <td><span class="badge" :class="s.status==='online'?'badge-online':'badge-offline'">{{ s.status }}</span></td>
          <td>{{ fmt(s.last_heartbeat) }}</td>
          <td><button class="btn btn-sm btn-danger" @click="unregisterSvc(s.id)">注销</button></td>
        </tr>
      </table>
      <div v-else class="empty">暂无注册服务</div>
    </div>

    <!-- 节点管理 -->
    <div v-show="tab==='nodes'">
      <h3 style="margin-bottom:16px;font-size:16px">节点管理</h3>
      <table v-if="nodes.length">
        <tr><th>ID</th><th>角色</th><th>平台</th><th>区域</th><th>心跳</th></tr>
        <tr v-for="n in nodes" :key="n.id">
          <td class="key-val">{{ n.id.slice(0,8) }}...</td>
          <td><span class="badge" :class="n.role==='master'?'badge-master':'badge-slave'">{{ n.role }}</span></td>
          <td>{{ n.platform }}</td><td>{{ n.region }}</td><td>{{ fmt(n.last_heartbeat) }}</td>
        </tr>
      </table>
      <div v-else class="empty">暂无节点</div>
    </div>

    <!-- 密钥管理 -->
    <div v-show="tab==='keys'">
      <h3 style="margin-bottom:16px;font-size:16px">密钥管理</h3>
      <div v-if="lastCreatedKey" class="key-created">
        <span>✅ 密钥已创建，请妥善保存：</span>
        <span class="key-value">{{ lastCreatedKey }}</span>
        <span class="copy-btn" @click="copyKey(lastCreatedKey)">复制</span>
        <span class="copy-btn" @click="lastCreatedKey=''" style="color:var(--text2)">✕</span>
      </div>
      <div class="form-row" style="margin-bottom:16px">
        <input v-model="newKeyName" placeholder="密钥名称">
        <button class="btn btn-primary" @click="createKey">创建密钥</button>
      </div>
      <table v-if="keys.length">
        <tr><th>名称</th><th>密钥</th><th>创建时间</th><th>操作</th></tr>
        <tr v-for="k in keys" :key="k.id">
          <td>{{ k.name }}</td>
          <td><span class="key-val">{{ k.key }}</span></td>
          <td>{{ fmt(k.created_at) }}</td>
          <td><button class="btn btn-sm btn-danger" @click="deleteKey(k.id)">删除</button></td>
        </tr>
      </table>
      <div v-else class="empty">暂无密钥，请创建一个用于服务注册认证</div>
    </div>

    <!-- 系统设置 -->
    <div v-show="tab==='settings'">
      <h3 style="margin-bottom:16px;font-size:16px">系统设置</h3>
      <div class="tab-bar">
        <div class="tab-item" :class="{active:settingsTab==='admins'}" @click="settingsTab='admins';loadAdmins()">管理员管理</div>
        <div class="tab-item" :class="{active:settingsTab==='config'}" @click="settingsTab='config'">系统配置</div>
        <div class="tab-item" :class="{active:settingsTab==='help'}" @click="settingsTab='help'">系统帮助</div>
        <div class="tab-item" :class="{active:settingsTab==='api'}" @click="settingsTab='api'">接口文档</div>
      </div>

      <!-- 管理员管理 -->
      <div v-show="settingsTab==='admins'">
        <div class="form-row" style="margin-bottom:16px">
          <input v-model="newAdminName" placeholder="GitHub 用户名">
          <button class="btn btn-primary" @click="addAdmin">添加管理员</button>
        </div>
        <table v-if="admins.length">
          <tr><th>用户名</th><th>来源</th><th>操作</th></tr>
          <tr v-for="a in admins" :key="a.username">
            <td>{{ a.username }}</td>
            <td><span class="badge">{{ a.source }}</span></td>
            <td>
              <button class="btn btn-sm btn-danger" @click="removeAdmin(a.username)">删除</button>
            </td>
          </tr>
        </table>
        <div v-else class="empty">暂无管理员</div>
      </div>

      <!-- 系统配置 -->
      <div v-show="settingsTab==='config'">
        <div class="config-group">
          <h4>界面布局</h4>
          <div class="config-option">
            <label>菜单位置</label>
            <div class="radio-group">
              <div class="radio-btn" :class="{active:sidebarPosition==='left'}" @click="setSidebarPosition('left')">左侧</div>
              <div class="radio-btn" :class="{active:sidebarPosition==='top'}" @click="setSidebarPosition('top')">顶部</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 系统帮助 -->
      <div v-show="settingsTab==='help'" style="font-size:13px;line-height:1.8;color:var(--text)">
        <div class="help-section">
          <h4>💬 消息管理</h4>
          <p>管理所有已发送的消息，支持发送新消息、查看和删除历史消息。</p>
          <ul>
            <li><b>发送消息：</b>点击「发送消息」按钮打开弹窗，依次选择平台（Web/PC-Windows/PC-macOS/PC-Linux/Android/iOS）、填写应用包名（如 com.example.app）、可选填用户ID（留空则对该应用下所有注册用户广播）、选择消息类型（通知/消息/命令）、填写JSON格式内容、选择是否持久化存储。</li>
            <li><b>用户ID说明：</b>非必填。填写则定向推送给指定用户；留空则推送给该应用下所有已注册的用户。</li>
            <li><b>消息类型：</b>通知（notification）= 系统通知推送；消息（message）= 即时消息；命令（shell）= 远程命令执行。</li>
            <li><b>删除消息：</b>每行操作列的「删除」按钮可删除单条消息。</li>
          </ul>
        </div>
        <div class="help-section">
          <h4>🔗 服务管理</h4>
          <p>管理通过密钥注册的推送服务节点，每个服务代表一个可接收消息推送的终端。</p>
          <ul>
            <li><b>服务注册流程：</b>客户端使用密钥管理中创建的 API Key，调用 <code>POST /api/v1/service/register</code> 接口完成注册，需提供名称、endpoint URL、应用包名、支持平台列表。</li>
            <li><b>密钥校验：</b>注册时必须提供有效的 API Key，系统会校验密钥是否存在于密钥列表中，校验通过才允许注册。密钥与服务的关联通过 secret_hash 建立。</li>
            <li><b>心跳机制：</b>服务需定期调用 <code>POST /api/v1/service/heartbeat</code> 维持在线状态，超时未心跳的服务会标记为 offline。</li>
            <li><b>注销服务：</b>点击「注销」按钮可手动注销服务，注销后不再接收消息推送。</li>
            <li><b>级联删除：</b>删除密钥时，使用该密钥注册的所有服务会被自动级联注销。</li>
          </ul>
        </div>
        <div class="help-section">
          <h4>🖥️ 节点管理</h4>
          <p>展示当前部署的 Worker 节点信息，包括角色（Master/Slave）、平台、区域和心跳时间。</p>
          <ul>
            <li><b>Master 选举：</b>基于 Cloudflare Durable Object 实现，多个节点自动选举 Master，Master 负责协调消息分发。</li>
            <li><b>心跳超时：</b>60秒无心跳自动触发重新选举。</li>
            <li><b>定时任务：</b>每5分钟执行一次 cron，清理过期消息。</li>
          </ul>
        </div>
        <div class="help-section">
          <h4>🔑 密钥管理</h4>
          <p>管理 API Key，用于服务注册时的身份认证。每个密钥创建后生成唯一 token，服务注册时必须携带有效密钥。</p>
          <ul>
            <li><b>创建密钥：</b>输入密钥名称，点击「创建密钥」，系统自动生成 <code>bmsg_xxx</code> 格式的唯一密钥。创建成功后会显示密钥值，请立即复制保存——密钥仅展示一次。</li>
            <li><b>密钥用途：</b>服务注册接口 <code>POST /api/v1/service/register</code> 的 secret 字段需填入此密钥。</li>
            <li><b>删除密钥：</b>删除密钥会级联注销所有使用该密钥注册的服务，操作前会弹出确认提示。</li>
            <li><b>密钥-服务关联：</b>系统内部通过 secret_hash 建立密钥与服务的关联，删除密钥时自动清理关联服务。</li>
          </ul>
        </div>
        <div class="help-section">
          <h4>⚙️ 系统设置</h4>
          <p>管理员管理、系统配置和帮助文档。</p>
          <ul>
            <li><b>管理员管理：</b>查看所有管理员（内置 + 动态添加），可添加 GitHub 用户名为管理员，可删除动态添加的管理员。内置管理员不可删除。</li>
            <li><b>系统配置：</b>菜单位置切换（左侧边栏 / 顶部导航栏），修改后即时生效并持久化到浏览器本地存储。</li>
          </ul>
        </div>
        <div class="help-section">
          <h4>🔐 登录与认证</h4>
          <ul>
            <li><b>登录方式：</b>GitHub OAuth，仅管理员白名单内的 GitHub 用户可登录。</li>
            <li><b>会话有效期：</b>24小时，过期后需重新登录。</li>
            <li><b>权限说明：</b>所有管理接口（密钥、管理员、消息发送）均需管理员身份认证，未认证请求返回 401。</li>
          </ul>
        </div>
      </div>

      <!-- 接口文档 -->
      <div v-show="settingsTab==='api'" style="font-size:13px">
        <div class="api-doc" v-for="ep in apiDocs" :key="ep.path" style="margin-bottom:24px;border:1px solid var(--border);border-radius:8px;overflow:hidden">
          <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border)">
            <span class="badge" :style="{background:ep.color,color:'#fff',fontFamily:'monospace',fontSize:'11px'}">{{ ep.method }}</span>
            <code style="font-size:12px;font-weight:600">{{ ep.path }}</code>
            <span style="color:var(--text2);font-size:12px">{{ ep.desc }}</span>
          </div>
          <div style="padding:12px 16px">
            <div v-if="ep.auth" style="margin-bottom:8px;color:var(--text2);font-size:12px">🔒 需要管理员认证</div>
            <div v-if="ep.params" style="margin-bottom:10px">
              <div style="color:var(--text2);font-size:11px;font-weight:500;margin-bottom:4px">请求参数</div>
              <pre style="background:var(--surface);padding:10px 12px;border-radius:6px;font-size:12px;overflow-x:auto;line-height:1.5;margin:0">{{ ep.params }}</pre>
            </div>
            <div>
              <div style="color:var(--text2);font-size:11px;font-weight:500;margin-bottom:4px">响应结果</div>
              <pre style="background:var(--surface);padding:10px 12px;border-radius:6px;font-size:12px;overflow-x:auto;line-height:1.5;margin:0">{{ ep.response }}</pre>
            </div>
          </div>
        </div>
      </div>
    </div>
</div>
</template>

<!-- Send Message Modal -->
<div v-if="showSendMsg" class="modal-mask" @click.self="showSendMsg=false">
  <div class="modal">
    <h3>发送消息</h3>
    <div class="form-row"><label>平台</label>
      <select v-model="sendForm.platform">
        <option value="web">Web</option>
        <option value="pc-windows">PC-Windows</option>
        <option value="pc-macos">PC-macOS</option>
        <option value="pc-linux">PC-Linux</option>
        <option value="android">Android</option>
        <option value="ios">iOS</option>
      </select>
    </div>
    <div class="form-row"><label>应用</label><input v-model="sendForm.app_package" placeholder="com.example.app"></div>
    <div class="form-row">
      <label>用户ID</label>
      <input v-model="sendForm.user_id" placeholder="留空则发送给该应用所有用户">
      <span class="badge badge-optional">非必填</span>
    </div>
    <div class="form-row"><label>类型</label><select v-model="sendForm.msg_type"><option value="notification">通知</option><option value="message">消息</option><option value="shell">命令</option></select></div>
    <div class="form-row"><label>内容</label><input v-model="sendForm.content" placeholder='JSON 如 {"text":"hi"}'></div>
    <div class="form-row"><label>存储</label><select v-model="sendForm.persist"><option :value="true">是</option><option :value="false">否</option></select></div>
    <div class="modal-actions"><button class="btn" @click="showSendMsg=false">取消</button><button class="btn btn-primary" @click="sendMessage">发送</button></div>
  </div>
</div>

<!-- Toast -->
<div v-if="toast.show" class="toast" :class="'toast-'+toast.type">{{ toast.msg }}</div>

</div>

<script>
function App() {
  return {
    authed: false, currentUser: '', avatarUrl: null, theme: localStorage.getItem('bmsg-theme') || 'dark',
    tab: 'messages', settingsTab: 'admins', sidebarPosition: localStorage.getItem('bmsg-sidebar-pos') || 'left',
    messages: [], services: [], nodes: [], keys: [], admins: [],
    showSendMsg: false, newKeyName: '', newAdminName: '', lastCreatedKey: '',
    sendForm: { platform:'web', app_package:'', user_id:'', msg_type:'notification', content:'{"text":"hello"}', persist:true },
    toast: { show: false, msg: '', type: 'success' },
    init() {
      this.applyTheme()
      this.applySidebarPosition()
      this.checkAuth()
    },
    applyTheme() { document.documentElement.setAttribute('data-theme', this.theme) },
    toggleTheme() { this.theme = this.theme==='dark'?'light':'dark'; localStorage.setItem('bmsg-theme', this.theme); this.applyTheme() },
    applySidebarPosition() {
      document.body.classList.remove('layout-left','layout-top')
      document.body.classList.add('layout-' + this.sidebarPosition)
    },
    setSidebarPosition(pos) {
      this.sidebarPosition = pos
      localStorage.setItem('bmsg-sidebar-pos', pos)
      this.applySidebarPosition()
    },
    showToast(msg, type) {
      this.toast = { show: true, msg, type: type || 'success' }
      setTimeout(() => { this.toast.show = false }, 3000)
    },
    async api(path, opts, silent) {
      try {
        const r = await fetch(path.startsWith('/') ? path : '/api/v1/' + path, opts)
        if (r.status === 401) return null
        const data = await r.json()
        if (data.code !== undefined && data.code !== 0) {
          if (!silent) this.showToast(data.message || '操作失败', 'error')
          return null
        }
        return data
      } catch(e) {
        console.error(e)
        if (!silent) this.showToast('请求失败', 'error')
        return null
      }
    },
    async checkAuth() {
      const r = await this.api('/api/auth/session', null, true)
      if (r && r.code === 0) {
        this.authed = true
        this.currentUser = r.username
        this.avatarUrl = 'https://github.com/' + r.username + '.png?size=64'
        this.loadMessages()
      } else { this.authed = false }
    },
    async logout() { await fetch('/api/auth/logout', {method:'POST'}); this.authed = false },
    async loadMessages() { const r = await this.api('message/list'); if(r?.data) this.messages = r.data },
    async loadServices() { const r = await this.api('service/list'); if(r?.data) this.services = r.data },
    async loadNodes() { const r = await this.api('node/list'); if(r?.data) this.nodes = r.data },
    async loadKeys() { const r = await this.api('admin/key/list'); if(r?.data) this.keys = r.data },
    async loadAdmins() { const r = await this.api('admin/list'); if(r?.data) this.admins = r.data },
    async deleteMsg(id) { if(!await this.api('message/'+id, {method:'DELETE'})) return; this.showToast('消息已删除'); this.loadMessages() },
    async unregisterSvc(id) {
      if(!confirm('确认注销该服务?')) return
      if(!await this.api('service/unregister',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})})) return
      this.showToast('服务已注销'); this.loadServices()
    },
    async createKey() {
      if(!this.newKeyName) { this.showToast('请输入密钥名称','error'); return }
      const r = await this.api('admin/key/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:this.newKeyName})})
      if(!r) return
      if(r.data && r.data.key) { this.lastCreatedKey = r.data.key }
      this.newKeyName = ''
      this.showToast('密钥创建成功')
      this.loadKeys()
    },
    copyKey(key) {
      navigator.clipboard.writeText(key).then(() => this.showToast('已复制到剪贴板')).catch(() => {})
    },
    async deleteKey(id) {
      if(!confirm('删除密钥将同步注销使用该密钥注册的所有服务，确认删除?')) return
      if(!await this.api('admin/key/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})})) return
      this.showToast('密钥已删除'); this.loadKeys(); this.loadServices()
    },
    async addAdmin() {
      if(!this.newAdminName) { this.showToast('请输入用户名','error'); return }
      if(!await this.api('admin/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:this.newAdminName})})) return
      this.newAdminName = ''; this.showToast('管理员已添加'); this.loadAdmins()
    },
    async removeAdmin(username) {
      if(!confirm('确认删除管理员 '+username+'?')) return
      if(!await this.api('admin/remove',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username})})) return
      this.showToast('管理员已删除'); this.loadAdmins()
    },
    async sendMessage() {
      let content;
      try { content = JSON.parse(this.sendForm.content) } catch(e) { content = {text:this.sendForm.content} }
      const target = {
        platform: this.sendForm.platform,
        app_package: this.sendForm.app_package,
        msg_type: this.sendForm.msg_type
      }
      if (this.sendForm.user_id) { target.user_id = this.sendForm.user_id }
      if(!await this.api('message/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        target, content, persist:this.sendForm.persist
      })})) return
      this.showToast('消息已发送'); this.showSendMsg=false; this.loadMessages()
    },
    fmt(ts) { if(!ts) return '-'; return new Date(ts*1000).toLocaleString('zh-CN',{hour12:false}) },
    apiDocs: [
      {method:'POST',path:'/api/v1/message/send',desc:'发送消息',auth:true,color:'#22c55e',
        params:'{\n  "target": {\n    "platform": "android",      // 必填: web|pc-windows|pc-macos|pc-linux|android|ios\n    "app_package": "com.example.app", // 必填: 应用包名\n    "user_id": "user123",            // 非必填: 留空则对该应用所有用户广播\n    "msg_type": "notification"        // 必填: notification|message|shell\n  },\n  "content": {"text": "hello"}, // 必填: JSON格式消息内容\n  "persist": true                 // 必填: 是否持久化存储\n}',
        response:'{\n  "code": 0,\n  "data": {\n    "id": "cbb2565c-...",\n    "delivered": 2,  // 成功投递的服务数\n    "failed": 0,     // 投递失败数\n    "persist": true\n  }\n}'},
      {method:'POST',path:'/api/v1/message/batch',desc:'批量发送消息',auth:true,color:'#22c55e',
        params:'{\n  "messages": [\n    {\n      "target": {"platform":"web","app_package":"com.app","msg_type":"notification"},\n      "content": {"text":"hi"},\n      "persist": true\n    }\n  ]\n}',
        response:'{\n  "code": 0,\n  "data": [\n    {"id":"xxx","status":"routed"}\n  ]\n}'},
      {method:'GET',path:'/api/v1/message/list',desc:'消息列表',auth:true,color:'#3b82f6',
        params:'无参数',
        response:'{\n  "code": 0,\n  "data": [\n    {\n      "id": "cbb2565c-...",\n      "target": {"platform":"ios","app_package":"com.test","user_id":"u1","msg_type":"notification"},\n      "content": {"text":"hello"},\n      "msg_type": "notification",\n      "persist": true,\n      "created_at": 1779875495\n    }\n  ]\n}'},
      {method:'GET',path:'/api/v1/message/:id',desc:'获取单条消息',auth:true,color:'#3b82f6',
        params:'路径参数: id = 消息ID',
        response:'{\n  "code": 0,\n  "data": {\n    "id": "cbb2565c-...",\n    "target": {...},\n    "content": {"text":"hello"},\n    "msg_type": "notification",\n    "persist": true\n  }\n}'},
      {method:'DELETE',path:'/api/v1/message/:id',desc:'删除消息',auth:true,color:'#ef4444',
        params:'路径参数: id = 消息ID',
        response:'{\n  "code": 0,\n  "data": {"deleted": true}\n}'},
      {method:'POST',path:'/api/v1/service/register',desc:'服务注册',auth:false,color:'#22c55e',
        params:'{\n  "name": "my-push-service",        // 必填: 服务名称\n  "endpoint": "https://api.example.com/push", // 必填: 推送接收地址\n  "app_package": "com.example.app", // 必填: 应用包名\n  "platforms": ["android","ios"],  // 必填: 支持的平台列表\n  "secret": "bmsg_xxxxxxxx"        // 必填: API密钥(密钥管理中创建)\n}',
        response:'{\n  "code": 0,\n  "data": {\n    "id": "svc-xxx",\n    "name": "my-push-service",\n    "endpoint": "https://api.example.com/push",\n    "status": "online"\n  }\n}'},
      {method:'POST',path:'/api/v1/service/unregister',desc:'注销服务',auth:false,color:'#22c55e',
        params:'{\n  "id": "svc-xxx"  // 必填: 服务ID\n}',
        response:'{\n  "code": 0,\n  "data": {"unregistered": true}\n}'},
      {method:'POST',path:'/api/v1/service/heartbeat',desc:'服务心跳',auth:false,color:'#22c55e',
        params:'{\n  "id": "svc-xxx"  // 必填: 服务ID\n}',
        response:'{\n  "code": 0,\n  "data": {"heartbeat": "ok"}\n}'},
      {method:'GET',path:'/api/v1/service/list',desc:'服务列表',auth:true,color:'#3b82f6',
        params:'无参数',
        response:'{\n  "code": 0,\n  "data": [\n    {\n      "id": "svc-xxx",\n      "name": "my-push-service",\n      "endpoint": "https://...",\n      "platforms": ["android","ios"],\n      "status": "online",\n      "last_heartbeat": 1779875495\n    }\n  ]\n}'},
      {method:'GET',path:'/api/v1/node/list',desc:'节点列表',auth:true,color:'#3b82f6',
        params:'无参数',
        response:'{\n  "code": 0,\n  "data": [\n    {\n      "id": "node-xxx",\n      "role": "master",  // master|slave\n      "platform": "cf-workers",\n      "region": "EEUR",\n      "last_heartbeat": 1779875495\n    }\n  ]\n}'},
      {method:'POST',path:'/api/v1/node/heartbeat',desc:'节点心跳',auth:true,color:'#22c55e',
        params:'无参数',
        response:'{\n  "code": 0,\n  "data": {"heartbeat": "ok"}\n}'},
      {method:'POST',path:'/api/v1/admin/key/create',desc:'创建密钥',auth:true,color:'#22c55e',
        params:'{\n  "name": "my-key"  // 必填: 密钥名称\n}',
        response:'{\n  "code": 0,\n  "data": {"key": "bmsg_a1b2c3d4e5f6..."}\n}'},
      {method:'POST',path:'/api/v1/admin/key/delete',desc:'删除密钥(级联注销关联服务)',auth:true,color:'#ef4444',
        params:'{\n  "id": "key-uuid-xxx"  // 必填: 密钥ID\n}',
        response:'{\n  "code": 0,\n  "message": "ok"\n}'},
      {method:'GET',path:'/api/v1/admin/key/list',desc:'密钥列表',auth:true,color:'#3b82f6',
        params:'无参数',
        response:'{\n  "code": 0,\n  "data": [\n    {"id":"key-uuid","name":"my-key","key":"bmsg_xxx","created_at":1779875495}\n  ]\n}'},
      {method:'POST',path:'/api/v1/admin/add',desc:'添加管理员',auth:true,color:'#22c55e',
        params:'{\n  "username": "github-user"  // 必填: GitHub用户名\n}',
        response:'{\n  "code": 0,\n  "message": "ok"\n}'},
      {method:'POST',path:'/api/v1/admin/remove',desc:'删除管理员(不可删内置)',auth:true,color:'#ef4444',
        params:'{\n  "username": "github-user"  // 必填: dynamic来源的管理员用户名\n}',
        response:'{\n  "code": 0,\n  "message": "ok"\n}'},
      {method:'GET',path:'/api/v1/admin/list',desc:'管理员列表',auth:true,color:'#3b82f6',
        params:'无参数',
        response:'{\n  "code": 0,\n  "data": [\n    {"username":"fntp","source":"builtin"},\n    {"username":"custom-user","source":"dynamic"}\n  ]\n}'}
    ]
  }
}
PetiteVue.createApp().mount()
</script>
</body>
</html>
