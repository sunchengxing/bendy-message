name = "bendy-message"
main = "crates/cf-worker/src/lib.rs"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[build]
command = "cargo install worker-build && worker-build --release"

[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "bmsg-db"
database_name = "bendy-message-db"
database_id = "placeholder-change-me"

[[kv_namespaces]]
binding = "bmsg-cache"
id = "placeholder-change-me"

[[kv_namespaces]]
binding = "bmsg-services"
id = "placeholder-change-me"

[[durable_objects.bindings]]
name = "bmsg-election"
class_name = "LeaderElectionDO"
script_name = "bendy-message"

[vars]
REGISTRATION_SECRET = "change-me-in-production"
